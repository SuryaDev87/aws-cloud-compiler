name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-compiler-backend:latest

    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 13.50.5.227
        username: ec2-user
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cloud-compiler-backend:latest
          sudo docker stop compiler-backend || true
          sudo docker rm compiler-backend || true
          sudo docker run -d \
            --name compiler-backend \
            -p 8081:8081 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ secrets.DOCKERHUB_USERNAME }}/cloud-compiler-backend:latest